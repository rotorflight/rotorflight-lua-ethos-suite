# Release trigger update.
name: Publish Smooth2 Release

on:
  push:
    paths:
      - '.github/workflows/release-smooth2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TAG: v2.3.0-smooth2
      TITLE: Rotorflight Lua ETHOS Suite 2.3.0-smooth2
      INSTALLER: Rotorflight-Lua-ETHOS-Suite-2.3.0-smooth2-en-INSTALL.zip
      CHECKSUMS: Rotorflight-Lua-ETHOS-Suite-2.3.0-smooth2-SHA256SUMS.txt

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build ETHOS Suite installer
        shell: bash
        run: |
          set -euo pipefail
          bash bin/package/package.sh en 2.3.0-smooth2 \
            --artifact-name "$INSTALLER" \
            --manifest-version 2.3.0 \
            --release-notes-file SMOOTH2_CHANGELOG.md

      - name: Validate installer and create checksum
        shell: bash
        run: |
          set -euo pipefail
          python3 bin/package/validate_ethos_manifest_zip.py "$INSTALLER"
          sha256sum "$INSTALLER" > "$CHECKSUMS"
          unzip -t "$INSTALLER"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --notes-file SMOOTH2_CHANGELOG.md \
              --latest
            gh release upload "$TAG" "$INSTALLER" "$CHECKSUMS" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" "$INSTALLER" "$CHECKSUMS" \
              --repo "$GITHUB_REPOSITORY" \
              --target master \
              --title "$TITLE" \
              --notes-file SMOOTH2_CHANGELOG.md \
              --latest
          fi
