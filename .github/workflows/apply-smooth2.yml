# Retriggered after the workflow was present on master.
name: Apply Rotorflight ETHOS Smooth2

on:
  push:
    paths:
      - '.github/workflows/apply-smooth2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .smooth2patch/part.* > /tmp/smooth2.patch
          echo '5a17912c9ec0243ccaa9d626caaa4002ba2d5eeab9971563a86a7a60a1307699  /tmp/smooth2.patch' | sha256sum -c -

      - name: Apply Smooth2 source changes
        shell: bash
        run: |
          set -euo pipefail
          files=(
            src/rfsuite/lib/utils.lua
            src/rfsuite/tasks/tasks.lua
            src/rfsuite/tasks/scheduler/msp/common.lua
            src/rfsuite/tasks/scheduler/msp/mspQueue.lua
            src/rfsuite/app/app.lua
            src/rfsuite/app/lib/ui.lua
            src/rfsuite/tasks/scheduler/msp/api.lua
            src/rfsuite/tasks/scheduler/msp/api/core.lua
          )
          for file in "${files[@]}"; do
            sed -i 's/\r$//' "$file"
          done
          git apply --whitespace=nowarn /tmp/smooth2.patch

          cat > SMOOTH2_CHANGELOG.md <<'EOF'
          # Rotorflight ETHOS Smooth2

          - Separates MSP scheduler wake requests from the active busy state.
          - Prevents retries while fragmented replies are still progressing.
          - Uses transport-specific receive-inactivity and transaction limits.
          - Adds bounded API/help caches and incremental navigation garbage collection.
          - Preserves FrSky versioned MSPv1 behavior confirmed by radio capture.
          - Performs no SD-card writes in the live telemetry transport path.
          EOF
          sed -i 's/^          //' SMOOTH2_CHANGELOG.md

      - name: Validate changed Lua files
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.4
          changed=(
            src/rfsuite/main.lua
            src/rfsuite/lib/utils.lua
            src/rfsuite/tasks/tasks.lua
            src/rfsuite/tasks/scheduler/msp/common.lua
            src/rfsuite/tasks/scheduler/msp/msp.lua
            src/rfsuite/tasks/scheduler/msp/mspQueue.lua
            src/rfsuite/tasks/scheduler/msp/protocols.lua
            src/rfsuite/app/app.lua
            src/rfsuite/app/lib/ui.lua
            src/rfsuite/tasks/scheduler/msp/api.lua
            src/rfsuite/tasks/scheduler/msp/api/core.lua
          )
          for file in "${changed[@]}"; do
            luac5.4 -p "$file"
          done

      - name: Commit clean Smooth2 source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .smooth2 .smooth2hex .smooth2e .smooth2patch
          rm -f .github/workflows/apply-smooth2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply Rotorflight ETHOS Smooth2 performance improvements'
          git push origin HEAD:master
